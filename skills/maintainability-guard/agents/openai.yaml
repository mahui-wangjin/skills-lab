interface:
  display_name: "Maintainability Guard"
  short_description: "Guard maintainability, reuse, test bloat, and boundaries before changes."
  default_prompt: "Use $maintainability-guard before adding behavior to large, mixed-responsibility, or likely-reused code, including smoke/E2E/browser automation and validation scripts. Always run a lightweight boundary check, even for small files: identify the new responsibility, caller/use-case pressure, reuse or duplication signals, test boundary, dependency direction, and whether extraction would create a real contract or only a pass-through wrapper. For test automation, keep runner/bootstrap, fixtures, selectors, actions, assertions, evidence capture, reporting, and cleanup as explicit responsibilities instead of dumping them into one giant script. Keep AI-driven browser/E2E work evidence-oriented with target flows, viewports, assertions, screenshots/traces, console/network logs, and a stopping condition; confirm an acceptance budget before broad, iterative, slow, authenticated, third-party, or high time/token-cost exploration."
