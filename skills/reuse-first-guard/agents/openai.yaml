interface:
  display_name: "Reuse First Guard"
  short_description: "Gate major build decisions before exploration or implementation, starting with project-local reuse."
  default_prompt: "Use $reuse-first-guard to emit a reuse-first decision before exploring, planning, or building when a task introduces a new technical decision. Check project-local modules, pages, components, adapters, tests, templates, and demos first; then official, managed, open-source, generated, and custom paths. For commodity UI behavior, keep visuals custom only when needed while reusing local, native, official, headless, or mature behavior layers."
