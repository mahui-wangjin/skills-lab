interface:
  display_name: "Design to Frontend Delivery"
  short_description: "Frontend delivery with source, layers, shell, interactions, assets."
  default_prompt: "Use $design-to-frontend-delivery to turn design artifacts into a frontend deliverable or polish an existing frontend project. Read structured platform context before screenshots whenever available. Treat 1:1/pixel-perfect wording as high-fidelity visual intent, not literal pixel parity and not permission to copy coordinates. Before coding, create a UI layer ownership map: app shell, page frame, content sections, repeated items, local controls, overlay/feedback, decoration/media, and data/state owners; do not place components by visual proximity alone or use z-index/portal fixes to hide wrong ownership. Classify the deliverable as content-only, inside-existing-shell, or full-page-with-shell; reuse accepted host shells, navigation, toolbars, modal/drawer/confirm/toast roots, and shared loading/empty/error patterns instead of ignoring them when a design omits common areas. Make clickable surfaces demo-ready with semantic controls, cursor affordance, hover/active/focus-visible, disabled/loading, overlay close paths, keyboard/touch basics, and feedback states. Before completion, run the project's E2E/smoke/browser/screenshot workflow or the smallest real-browser self-test covering main flow, layer ownership, overlays, viewports, console errors, failed requests, and loaded assets; if this cannot run, mark the result conditional/self-reviewed. Verify required fonts, weights, icons, images, media, and tokens are available to the project instead of relying on local-machine assets. Follow the target framework and project directory conventions; separate page entries, components, fixtures, selectors, state/hooks, styles, assets, and tests instead of dumping everything into one file or folder. In mock/static delivery, keep data as fixtures or BFF-shaped mocks, keep only lightweight UI state in frontend, and do not implement BFF/API business state machines unless real API integration is explicitly in scope."
