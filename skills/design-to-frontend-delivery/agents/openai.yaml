interface:
  display_name: "Design to Frontend Delivery"
  short_description: "Frontend delivery with real-browser acceptance, source fidelity, layers, and structure."
  default_prompt: "Use $design-to-frontend-delivery to turn design artifacts into a frontend deliverable, polish an existing frontend project, or continue after design delivery with API wiring, feature changes, or bug fixes. Read structured platform context before screenshots whenever available. Treat 1:1/pixel-perfect wording as high-fidelity visual intent, not literal pixel parity and not permission to copy coordinates. Reuse exact icons, SVGs, assets, component variants, tokens, borders, padding, radii, shadows, hover/focus/disabled/loading states, and motion details from the design source or project system; do not hand-draw, substitute, or invent visual details when the source/project already provides them. Before coding, create a UI layer ownership map: app shell, page frame, content sections, repeated items, local controls, overlay/feedback, decoration/media, and data/state owners; do not place components by visual proximity alone or use z-index/portal fixes to hide wrong ownership. Classify the deliverable as content-only, inside-existing-shell, or full-page-with-shell; reuse accepted host shells, navigation, toolbars, modal/drawer/confirm/toast roots, and shared loading/empty/error patterns instead of ignoring them when a design omits common areas. Make clickable surfaces demo-ready with semantic controls, cursor affordance, hover/active/focus-visible, disabled/loading, overlay close paths, keyboard/touch basics, and feedback states. For API integration, functional changes, or bug fixes, identify the accepted baseline, API/behavior contract, impact surface, affected shared consumers, and regression plan before implementation; preserve unrelated pages and accepted design behavior. Before completion, run a real-browser acceptance path using the project's E2E, agent-browser, Playwright, Cypress, browser, screenshot, preview, or Storybook-in-browser workflow; smoke/unit/component/typecheck evidence is supporting only and cannot prove frontend UI quality by itself. Cover main flow, layer ownership, overlays, viewports, console errors, failed requests, loaded assets, icon/detail fidelity, and affected regressions; if real-browser verification or browser debugging cannot run, explicitly remind the user which console/network/runtime/layout/screenshot evidence is missing and what environment/tool/access is needed, mark the result conditional/self-reviewed or code-level candidate, and do not call it demo-ready or complete from smoke-only evidence. Verify required fonts, weights, icons, images, media, and tokens are available to the project instead of relying on local-machine assets. Follow the target framework and project directory conventions; separate page entries, components, fixtures, selectors, state/hooks, styles, assets, and tests instead of dumping everything into one file or folder. Keep smoke/E2E/browser automation code maintainable by separating runner setup, fixtures, selectors/actions, assertions, evidence capture, reporting, and cleanup. In mock/static delivery, keep data as fixtures or BFF-shaped mocks, keep only lightweight UI state in frontend, and do not implement BFF/API business state machines unless real API integration is explicitly in scope."
