interface:
  display_name: "Design to Frontend Delivery"
  short_description: "Frontend delivery with source, layout, structure, and mock/API boundaries."
  default_prompt: "Use $design-to-frontend-delivery to turn design artifacts into a frontend deliverable or polish an existing frontend project. Read structured platform context before screenshots whenever available. Treat 1:1/pixel-perfect wording as high-fidelity visual intent, not permission to copy coordinates. Follow the target framework and project directory conventions; separate page entries, components, fixtures, selectors, state/hooks, styles, assets, and tests instead of dumping everything into one file or folder. In mock/static delivery, keep data as fixtures or BFF-shaped mocks, keep only lightweight UI state in frontend, and do not implement BFF/API business state machines unless real API integration is explicitly in scope."
