interface:
  display_name: "Admin UI Pattern System"
  short_description: "Confirm admin content-area wireframes and reusable page patterns before coding."
  default_prompt: "Use $admin-ui-pattern-system before building or reviewing an admin/backoffice page. First model user tasks, inspect the current template examples and components, confirm the content-area wireframe and foundational elements such as search collapse, filters, refresh, fullscreen, column settings, and pagination, then propose the project-level page pattern, prefer drawers for details and editing, and verify field, action, state, and layout usability before implementation is considered complete."
