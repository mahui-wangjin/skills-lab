interface:
  display_name: "Admin UI Pattern System"
  short_description: "Confirm admin wireframes, reusable page patterns, non-CRUD layouts, and acceptance evidence."
  default_prompt: "Use $admin-ui-pattern-system before designing, building, refactoring, or reviewing an admin/backoffice page. First model user tasks, inspect current template examples and components, record the layout decision path, confirm or produce the content-area wireframe and foundational elements such as search collapse, filters, refresh, fullscreen, column settings, and pagination, choose the right CRUD or non-CRUD page pattern, prefer drawers for details and editing, and do not claim product-level completion without template evidence, wireframe confirmation or an explicit self-reviewed downgrade, state coverage, and actual browser/screenshot/manual verification results."
